basePath: /
definitions:
  kualitas.DTODetailInspeksi:
    properties:
      kodeCacat:
        type: string
      rasioCacat:
        description: NG
        minimum: 0
        type: number
      rasioTotalOK:
        minimum: 0
        type: number
      totalProduksi:
        minimum: 0
        type: number
      unikPartId:
        type: integer
      waktuPergeseran:
        description: Shift
        type: string
    required:
    - kodeCacat
    - unikPartId
    - waktuPergeseran
    type: object
  kualitas.DTOLembarPeriksaKirim:
    properties:
      detail:
        items:
          $ref: '#/definitions/kualitas.DTODetailInspeksi'
        type: array
      penggunaIdTercatat:
        type: integer
      tanggal:
        type: string
      zonaLini:
        type: string
    required:
    - detail
    - penggunaIdTercatat
    - tanggal
    - zonaLini
    type: object
  otentikasi.DataPermintaanLogin:
    properties:
      sandi:
        type: string
      surel:
        type: string
    required:
    - sandi
    - surel
    type: object
  otentikasi.DataPermintaanLupaSandi:
    properties:
      sandiBaru:
        minLength: 8
        type: string
      surel:
        type: string
    required:
    - sandiBaru
    - surel
    type: object
  otentikasi.DataPermintaanRegistrasi:
    properties:
      peran:
        type: string
      sandi:
        minLength: 8
        type: string
      surel:
        type: string
    required:
    - sandi
    - surel
    type: object
  respon.ResponStandar:
    properties:
      data: {}
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      status:
        description: '"success" atau "fail" atau "error"'
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: REST API untuk ekosistem manufaktur dan kontrol kualitas PGNServer.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: PGNServer API
  version: "1.0"
paths:
  /api/v1/analitik/lacak:
    get:
      consumes:
      - application/json
      description: Menelusuri defects produk hingga ke level bahan baku pembentuk
        & supplier
      parameters:
      - description: Kode Defect Cacat
        in: query
        name: kode_cacat
        required: true
        type: string
      - description: SKU Produk Jadi (Finished Good)
        in: query
        name: parent_sku
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Lacak Akar Masalah Defect (BOM Tracing)
      tags:
      - Analitik
  /api/v1/analitik/metrik_pareto_bulanan:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 per bulan menggunakan Window
        Function SQL
      parameters:
      - description: Bulan (1-12)
        in: query
        name: bulan
        type: integer
      - description: 'Tahun (contoh: 2026)'
        in: query
        name: tahun
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Metrik Pareto Bulanan
      tags:
      - Analitik
  /api/v1/analitik/pareto:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 berdasarkan tanggal mulai,
        tanggal selesai, dan lini.
      parameters:
      - description: Tanggal Mulai (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Tanggal Selesai (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Nama Lini / Zona
        in: query
        name: line
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Pareto Dinamis
      tags:
      - Analitik
  /api/v1/materials/{id}/media:
    post:
      consumes:
      - multipart/form-data
      description: Menyimpan foto atau bukti cacat terkait suatu material
      parameters:
      - description: ID Material
        in: path
        name: id
        required: true
        type: integer
      - description: Berkas gambar (JPG/PNG, Maks 5MB)
        in: formData
        name: berkas
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Unggah Media Material
      tags:
      - Media
  /api/v1/media/{id}/pratinjau:
    get:
      description: Merender berkas media ke peramban
      parameters:
      - description: ID Media
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Pratinjau Media
      tags:
      - Media
  /api/v1/operasi/rekam_lembar_periksa:
    post:
      consumes:
      - application/json
      description: Menyimpan entri lembar periksa beserta detail inspeksinya
      parameters:
      - description: Payload Lembar Periksa
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/kualitas.DTOLembarPeriksaKirim'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Rekam Lembar Periksa
      tags:
      - Kualitas
  /api/v1/operasi/riwayat_lembar_periksa:
    get:
      description: Menampilkan daftar historis lembar periksa dengan filter kalender
      parameters:
      - description: Batas jumlah data (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset paginasi (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter tanggal mulai (YYYY-MM-DD)
        in: query
        name: tanggal_mulai
        type: string
      - description: Filter tanggal selesai (YYYY-MM-DD)
        in: query
        name: tanggal_selesai
        type: string
      - description: Filter zona lini
        in: query
        name: zona_lini
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Riwayat Lembar Periksa
      tags:
      - Kualitas
  /api/v1/otentikasi/daftar:
    post:
      consumes:
      - application/json
      description: Mendaftarkan kredensial staf QC/Manajemen baru
      parameters:
      - description: Data pendaftaran
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanRegistrasi'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Pendaftaran Pengguna
      tags:
      - Otentikasi
  /api/v1/otentikasi/keluar:
    post:
      description: Mengakhiri sesi pengguna (Client-side token drop)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Akses Keluar
      tags:
      - Otentikasi
  /api/v1/otentikasi/lupa-sandi:
    post:
      consumes:
      - application/json
      description: Pemulihan akun QC
      parameters:
      - description: Permohonan Reset
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanLupaSandi'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Lupa Sandi
      tags:
      - Otentikasi
  /api/v1/otentikasi/masuk:
    post:
      consumes:
      - application/json
      description: Memberikan Token JWT untuk akses sesi internal
      parameters:
      - description: Kredensial
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanLogin'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Akses Masuk Pengguna
      tags:
      - Otentikasi
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
