      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Hapus Material
      tags:
      - Manufaktur - Material
    get:
      description: Mendapatkan data detail material berdasarkan ID
      parameters:
      - description: ID Material
