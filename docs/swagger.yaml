      tags:
      - Manufaktur - Customer
    post:
      consumes:
      - application/json
      description: Menyimpan data customer baru ke pangkalan data
      parameters:
      - description: Payload Tambah Customer
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/manufaktur.DTOCustomerSimpan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
                data:
                  $ref: '#/definitions/manufaktur.Customer'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
