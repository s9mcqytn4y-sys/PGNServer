    put:
      consumes:
      - application/json
      description: Memperbarui informasi customer berdasarkan ID
      parameters:
      - description: ID Customer
        in: path
        name: id
        required: true
        type: integer
      - description: Payload Perbarui Customer
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/manufaktur.DTOCustomerSimpan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
