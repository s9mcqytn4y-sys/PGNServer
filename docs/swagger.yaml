basePath: /
definitions:
  kualitas.DTODetailInspeksi:
    properties:
      kodeCacat:
        description: 'Kode cacat defect (misal: "A", "B", dll)'
        example: A
        type: string
      rasioCacat:
        description: Kuantitas barang reject / NG (Not Good)
        example: 2
        minimum: 0
        type: number
      rasioTotalOK:
        description: Kuantitas barang dengan status OK (Lolos QC)
        example: 98
        minimum: 0
        type: number
      totalProduksi:
        description: Total kuantitas barang yang diproduksi
        example: 100
        minimum: 0
        type: number
      unikPartId:
        description: ID unik part material yang diperiksa
        example: 1
        type: integer
      waktuPergeseran:
        description: Waktu/Shift pergeseran jam pemeriksaan
        example: "08:00"
        type: string
    required:
    - kodeCacat
    - unikPartId
    - waktuPergeseran
    type: object
  kualitas.DTOLembarPeriksaKirim:
    properties:
      detail:
        description: Himpunan baris rincian inspeksi part
        items:
          $ref: '#/definitions/kualitas.DTODetailInspeksi'
        type: array
      penggunaIdTercatat:
        description: ID pengguna/staf QC yang merekam data
        example: 1
        type: integer
      tanggal:
        description: Tanggal pemeriksaan (format ISO 8601)
        example: "2026-05-17T00:00:00Z"
        type: string
      zonaLini:
        description: Zona atau Lini produksi tempat inspeksi
        example: Lini 1
        type: string
    required:
    - detail
    - penggunaIdTercatat
    - tanggal
    - zonaLini
    type: object
  manufaktur.Customer:
    properties:
      customerCode:
        type: string
      dibuatPada:
        type: string
      diubahPada:
        type: string
      id:
        type: integer
      kontak:
        type: string
      nama:
        type: string
    type: object
  manufaktur.DTOBOMSimpan:
    properties:
      idParentMaterial:
        type: integer
      idRawMaterial:
        type: integer
      parameterKuantitasPembentuk:
        type: number
    required:
    - idRawMaterial
    - parameterKuantitasPembentuk
    type: object
  manufaktur.DTOCustomerSimpan:
    properties:
      customerCode:
        type: string
      kontak:
        type: string
      nama:
        type: string
    required:
    - customerCode
    - nama
    type: object
  manufaktur.DTOMaterialSimpan:
    properties:
      beratGSM:
        type: integer
      idPemasok:
        type: integer
      kodeSKU:
        type: string
      lebarCM:
        type: number
      namaMaterial:
        type: string
      panjangCM:
        type: number
      tebalCM:
        type: number
      unitSatuan:
        type: string
    required:
    - idPemasok
    - kodeSKU
    - namaMaterial
    - unitSatuan
    type: object
  manufaktur.DTOPemasokSimpan:
    properties:
      kontak:
        type: string
      namaEntitas:
        type: string
      supplierCode:
        type: string
    required:
    - namaEntitas
    - supplierCode
    type: object
  manufaktur.KomposisiMaterialBOM:
    properties:
      dibuatPada:
        type: string
      id:
        type: integer
      idParentMaterial:
        type: integer
      idRawMaterial:
        type: integer
      materialBaku:
        $ref: '#/definitions/manufaktur.Material'
      parameterKuantitasPembentuk:
        type: number
      parentMaterial:
        $ref: '#/definitions/manufaktur.Material'
    type: object
  manufaktur.Material:
    properties:
      beratGSM:
        type: integer
      dibuatPada:
        type: string
      diubahPada:
        type: string
      id:
        type: integer
      idPemasok:
        type: integer
      kodeSKU:
        type: string
      lebarCM:
        type: number
      namaMaterial:
        type: string
      panjangCM:
        type: number
      pemasok:
        $ref: '#/definitions/manufaktur.Pemasok'
      tebalCM:
        type: number
      unitSatuan:
        type: string
    type: object
  manufaktur.Pemasok:
    properties:
      dibuatPada:
        type: string
      diubahPada:
        type: string
      id:
        type: integer
      kontak:
        type: string
      namaEntitas:
        type: string
      supplierCode:
        type: string
    type: object
  otentikasi.DataPermintaanLogin:
    properties:
      kata_sandi:
        description: Fallback sandi untuk login retro-kompatibel
        example: admin
        type: string
      nip:
        description: Fallback NIP untuk login retro-kompatibel
        example: "2211019"
        type: string
      sandi:
        description: Kata sandi akun
        example: sandiRahasia123
        type: string
      surel:
        description: Surel akun terdaftar
        example: operator@pgn.com
        type: string
    type: object
  otentikasi.DataPermintaanLupaSandi:
    properties:
      kata_sandi:
        description: Fallback sandi baru retro-kompatibel
        example: admin
        type: string
      nip:
        description: Fallback NIP untuk reset retro-kompatibel
        example: "2211019"
        type: string
      sandiBaru:
        description: Kata sandi baru (Minimal 8 karakter)
        example: sandiBaru123
        type: string
      surel:
        description: Surel akun terdaftar
        example: operator@pgn.com
        type: string
    type: object
  otentikasi.DataPermintaanRegistrasi:
    properties:
      kata_sandi:
        description: Kata sandi fallback (Retro-kompatibilitas)
        example: admin
        type: string
      nama_lengkap:
        description: Nama lengkap pegawai (Opsional)
        example: Leader QC
        type: string
      nip:
        description: Nomor Induk Pegawai (Fallback retro-kompatibilitas)
        example: "2211019"
        type: string
      peran:
        description: 'Peran otorisasi: OPERATOR atau LEADER (Default: OPERATOR)'
        example: OPERATOR
        type: string
      sandi:
        description: Kata sandi minimal 8 karakter (Wajib jika kata_sandi kosong)
        example: sandiRahasia123
        type: string
      surel:
        description: Surel resmi pegawai (Wajib jika NIP kosong)
        example: operator@pgn.com
        type: string
    type: object
  respon.DetailKesalahan:
    properties:
      field:
        type: string
      pesan:
        type: string
    type: object
  respon.ResponStandar:
    properties:
      data: {}
      errors:
        items:
          type: string
        type: array
      kesalahan:
        items:
          $ref: '#/definitions/respon.DetailKesalahan'
        type: array
      message:
        type: string
      meta: {}
      metadata: {}
      pesan:
        type: string
      status:
        type: string
      success:
        description: Legacy fields untuk retro-kompatibilitas
        type: boolean
      sukses:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: REST API untuk ekosistem manufaktur dan kontrol kualitas PGNServer.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: PGNServer API
  version: "1.0"
paths:
  /api/v1/analitik/lacak:
    get:
      consumes:
      - application/json
      description: Menelusuri defects produk hingga ke level bahan baku pembentuk
        & supplier
      parameters:
      - description: Kode Defect Cacat
        in: query
        name: kode_cacat
        required: true
        type: string
      - description: SKU Produk Jadi (Finished Good)
        in: query
        name: parent_sku
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Lacak Akar Masalah Defect (BOM Tracing)
      tags:
      - Analitik
  /api/v1/analitik/metrik_pareto_bulanan:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 per bulan menggunakan Window
        Function SQL
      parameters:
      - description: Bulan (1-12)
        in: query
        name: bulan
        type: integer
      - description: 'Tahun (contoh: 2026)'
        in: query
        name: tahun
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Metrik Pareto Bulanan
      tags:
      - Analitik
  /api/v1/analitik/pareto:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 berdasarkan tanggal mulai,
        tanggal selesai, dan lini.
      parameters:
      - description: Tanggal Mulai (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Tanggal Selesai (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Nama Lini / Zona
        in: query
        name: line
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Pareto Dinamis
      tags:
      - Analitik
  /api/v1/boms:
    get:
      description: Menampilkan daftar seluruh relasi BOM beserta detail material terkait
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/manufaktur.KomposisiMaterialBOM'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Ambil Semua BOM
      tags:
      - Manufaktur - BOM
    post:
      consumes:
      - application/json
      description: Menyimpan relasi hirarkis BOM baru ke pangkalan data
      parameters:
      - description: Payload Tambah BOM
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/manufaktur.DTOBOMSimpan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
                data:
                  $ref: '#/definitions/manufaktur.KomposisiMaterialBOM'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Tambah BOM Baru
      tags:
      - Manufaktur - BOM
  /api/v1/boms/{id}:
    delete:
      description: Menghapus data relasi BOM dari sistem berdasarkan ID
      parameters:
      - description: ID BOM
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Hapus BOM
      tags:
      - Manufaktur - BOM
    get:
      description: Mendapatkan data detail relasi BOM berdasarkan ID
      parameters:
      - description: ID BOM
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
                data:
                  $ref: '#/definitions/manufaktur.KomposisiMaterialBOM'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Detail BOM
      tags:
      - Manufaktur - BOM
    put:
      consumes:
      - application/json
      description: Memperbarui informasi relasi BOM berdasarkan ID
      parameters:
      - description: ID BOM
        in: path
        name: id
        required: true
        type: integer
      - description: Payload Perbarui BOM
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/manufaktur.DTOBOMSimpan'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/respon.ResponStandar'
            - properties:
                data:
                  $ref: '#/definitions/manufaktur.KomposisiMaterialBOM'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Perbarui BOM
      tags:
      - Manufaktur - BOM
  /api/v1/cek_sistem:
    get:
      description: Memvalidasi kesiapan server API dan konektivitas live database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Pemeriksaan Kesehatan Sistem
      tags:
      - Sistem
