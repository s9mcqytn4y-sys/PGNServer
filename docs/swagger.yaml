basePath: /
definitions:
  kualitas.DTODetailInspeksi:
    properties:
      kodeCacat:
        description: 'Kode cacat defect (misal: "A", "B", dll)'
        example: A
        type: string
      rasioCacat:
        description: Kuantitas barang reject / NG (Not Good)
        example: 2
        minimum: 0
        type: number
      rasioTotalOK:
        description: Kuantitas barang dengan status OK (Lolos QC)
        example: 98
        minimum: 0
        type: number
      totalProduksi:
        description: Total kuantitas barang yang diproduksi
        example: 100
        minimum: 0
        type: number
      unikPartId:
        description: ID unik part material yang diperiksa
        example: 1
        type: integer
      waktuPergeseran:
        description: Waktu/Shift pergeseran jam pemeriksaan
        example: "08:00"
        type: string
    required:
    - kodeCacat
    - unikPartId
    - waktuPergeseran
    type: object
  kualitas.DTOLembarPeriksaKirim:
    properties:
      detail:
        description: Himpunan baris rincian inspeksi part
        items:
          $ref: '#/definitions/kualitas.DTODetailInspeksi'
        type: array
      penggunaIdTercatat:
        description: ID pengguna/staf QC yang merekam data
        example: 1
        type: integer
      tanggal:
        description: Tanggal pemeriksaan (format ISO 8601)
        example: "2026-05-17T00:00:00Z"
        type: string
      zonaLini:
        description: Zona atau Lini produksi tempat inspeksi
        example: Lini 1
        type: string
    required:
    - detail
    - penggunaIdTercatat
    - tanggal
    - zonaLini
    type: object
  otentikasi.DataPermintaanLogin:
    properties:
      kata_sandi:
        description: Fallback sandi untuk login retro-kompatibel
        example: admin
        type: string
      nip:
        description: Fallback NIP untuk login retro-kompatibel
        example: "2211019"
        type: string
      sandi:
        description: Kata sandi akun
        example: sandiRahasia123
        type: string
      surel:
        description: Surel akun terdaftar
        example: operator@pgn.com
        type: string
    type: object
  otentikasi.DataPermintaanLupaSandi:
    properties:
      kata_sandi:
        description: Fallback sandi baru retro-kompatibel
        example: admin
        type: string
      nip:
        description: Fallback NIP untuk reset retro-kompatibel
        example: "2211019"
        type: string
      sandiBaru:
        description: Kata sandi baru (Minimal 8 karakter)
        example: sandiBaru123
        type: string
      surel:
        description: Surel akun terdaftar
        example: operator@pgn.com
        type: string
    type: object
  otentikasi.DataPermintaanRegistrasi:
    properties:
      kata_sandi:
        description: Kata sandi fallback (Retro-kompatibilitas)
        example: admin
        type: string
      nama_lengkap:
        description: Nama lengkap pegawai (Opsional)
        example: Leader QC
        type: string
      nip:
        description: Nomor Induk Pegawai (Fallback retro-kompatibilitas)
        example: "2211019"
        type: string
      peran:
        description: 'Peran otorisasi: OPERATOR atau LEADER (Default: OPERATOR)'
        example: OPERATOR
        type: string
      sandi:
        description: Kata sandi minimal 8 karakter (Wajib jika kata_sandi kosong)
        example: sandiRahasia123
        type: string
      surel:
        description: Surel resmi pegawai (Wajib jika NIP kosong)
        example: operator@pgn.com
        type: string
    type: object
  respon.ResponStandar:
    properties:
      data: {}
      errors:
        items:
          type: string
        type: array
      message:
        type: string
      status:
        description: '"success" atau "fail" atau "error"'
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: REST API untuk ekosistem manufaktur dan kontrol kualitas PGNServer.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: PGNServer API
  version: "1.0"
paths:
  /api/v1/analitik/lacak:
    get:
      consumes:
      - application/json
      description: Menelusuri defects produk hingga ke level bahan baku pembentuk
        & supplier
      parameters:
      - description: Kode Defect Cacat
        in: query
        name: kode_cacat
        required: true
        type: string
      - description: SKU Produk Jadi (Finished Good)
        in: query
        name: parent_sku
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Lacak Akar Masalah Defect (BOM Tracing)
      tags:
      - Analitik
  /api/v1/analitik/metrik_pareto_bulanan:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 per bulan menggunakan Window
        Function SQL
      parameters:
      - description: Bulan (1-12)
        in: query
        name: bulan
        type: integer
      - description: 'Tahun (contoh: 2026)'
        in: query
        name: tahun
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Metrik Pareto Bulanan
      tags:
      - Analitik
  /api/v1/analitik/pareto:
    get:
      consumes:
      - application/json
      description: Mengembalikan kalkulasi Pareto 80/20 berdasarkan tanggal mulai,
        tanggal selesai, dan lini.
      parameters:
      - description: Tanggal Mulai (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Tanggal Selesai (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Nama Lini / Zona
        in: query
        name: line
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Dapatkan Pareto Dinamis
      tags:
      - Analitik
  /api/v1/cek_sistem:
    get:
      description: Memvalidasi kesiapan server API dan konektivitas live database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Pemeriksaan Kesehatan Sistem
      tags:
      - Sistem
  /api/v1/krusial/status:
    get:
      description: Menyajikan data status sensitif jika IP pengirim lolos Whitelisting
        korporasi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Status Operasi Krusial (Whitelisted IP)
      tags:
      - Sistem
  /api/v1/materials/{id}/media:
    post:
      consumes:
      - multipart/form-data
      description: Menyimpan foto atau bukti cacat terkait suatu material
      parameters:
      - description: ID Material
        in: path
        name: id
        required: true
        type: integer
      - description: Berkas gambar (JPG/PNG, Maks 5MB)
        in: formData
        name: berkas
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Unggah Media Material
      tags:
      - Media
  /api/v1/media/{id}/pratinjau:
    get:
      description: Merender berkas media ke peramban
      parameters:
      - description: ID Media
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Pratinjau Media
      tags:
      - Media
  /api/v1/operasi/rekam_lembar_periksa:
    post:
      consumes:
      - application/json
      description: Menyimpan entri lembar periksa beserta detail inspeksinya
      parameters:
      - description: Payload Lembar Periksa
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/kualitas.DTOLembarPeriksaKirim'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Rekam Lembar Periksa
      tags:
      - Kualitas
  /api/v1/operasi/riwayat_lembar_periksa:
    get:
      description: Menampilkan daftar historis lembar periksa dengan filter kalender
      parameters:
      - description: Batas jumlah data (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset paginasi (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter tanggal mulai (YYYY-MM-DD)
        in: query
        name: tanggal_mulai
        type: string
      - description: Filter tanggal selesai (YYYY-MM-DD)
        in: query
        name: tanggal_selesai
        type: string
      - description: Filter zona lini
        in: query
        name: zona_lini
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      security:
      - BearerAuth: []
      summary: Riwayat Lembar Periksa
      tags:
      - Kualitas
  /api/v1/otentikasi/daftar:
    post:
      consumes:
      - application/json
      description: Mendaftarkan kredensial staf QC/Manajemen baru dengan dukungan
        retro-kompatibilitas NIP/kata_sandi
      parameters:
      - description: Data pendaftaran
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanRegistrasi'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Pendaftaran Pengguna
      tags:
      - Otentikasi
  /api/v1/otentikasi/keluar:
    post:
      description: Mengakhiri sesi pengguna (Client-side token drop)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Akses Keluar
      tags:
      - Otentikasi
  /api/v1/otentikasi/lupa-sandi:
    post:
      consumes:
      - application/json
      description: Pemulihan akun QC dengan dukungan NIP/kata_sandi fallback
      parameters:
      - description: Permohonan Reset
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanLupaSandi'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Lupa Sandi
      tags:
      - Otentikasi
  /api/v1/otentikasi/masuk:
    post:
      consumes:
      - application/json
      description: Memberikan Token JWT untuk akses sesi internal dengan dukungan
        NIP/kata_sandi
      parameters:
      - description: Kredensial
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/otentikasi.DataPermintaanLogin'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respon.ResponStandar'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/respon.ResponStandar'
      summary: Akses Masuk Pengguna
      tags:
      - Otentikasi
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
