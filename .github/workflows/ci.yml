name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Go 1.25.x)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Security Scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Code Linting
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.0
          args: --timeout=5m

      - name: Run Tests (Race Detector)
        run: go test -race -v ./...

      - name: Verify Build
        run: GOEXPERIMENT=jsonv2 go build -o pgn_api ./cmd/api

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: pgnserver:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
